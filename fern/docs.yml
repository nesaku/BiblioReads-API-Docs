# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: biblioreads.docs.buildwithfern.com
    edit-this-page:
      github:
        owner: fern-starter
        repo: planetary-crescent-563699-n3o6v0vy
        branch: main
      launch: dashboard
title: BiblioReads | Documentation
layout:
  searchbar-placement: header
  page-width: full
